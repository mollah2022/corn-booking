services:
  postgres:
    image: postgres:16
    container_name: booking_postgres
    restart: always
    environment:
      POSTGRES_USER: booking_user
      POSTGRES_PASSWORD: booking_pass
      POSTGRES_DB: booking_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - booking_net

  dbgate:
    image: dbgate/dbgate
    container_name: booking_dbgate
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - dbgate_data:/root/.dbgate
    depends_on:
      - postgres
    networks:
      - booking_net

  redis:
    image: redis:7-alpine
    container_name: booking_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - booking_net

  test_postgres:
    image: postgres:16
    container_name: booking_test_postgres
    restart: always
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_pass
      POSTGRES_DB: test_booking_db
    ports:
      - "5434:5432"
    tmpfs:
      - /var/lib/postgresql/data
    networks:
      - booking_net

  api_app:
    build:
      context: .
      dockerfile: api_app/Dockerfile
    container_name: booking_api_app
    restart: always
    ports:
      - "5001:5001"
    environment:
      BOOKING_ENV: docker
    volumes:
      - ./.secrets.toml:/app/.secrets.toml:ro
    depends_on:
      - redis
    networks:
      - booking_net

  cron:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: booking_cron
    environment:
      BOOKING_ENV: docker
    volumes:
      - ./.secrets.toml:/app/.secrets.toml:ro
    depends_on:
      - postgres
      - api_app
    networks:
      - booking_net
    profiles:
      - manual

  sonarqube:
    image: sonarqube:community
    container_name: booking_sonarqube
    restart: always
    ports:
      - "9000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - booking_net

volumes:
  postgres_data:
  dbgate_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:

networks:
  booking_net:
    driver: bridge
